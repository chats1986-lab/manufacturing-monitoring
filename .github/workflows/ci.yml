name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: additive
          POSTGRES_PASSWORD: additive
          POSTGRES_DB: additive_monitoring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U additive -d additive_monitoring"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: sensor

    env:
      DATABASE_URL: postgresql://additive:additive@localhost:5432/additive_monitoring

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sensor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -U additive -d additive_monitoring; then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          echo "PostgreSQL did not become ready"
          exit 1

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t sensor-backend ./sensor

      - name: Build frontend image
        run: docker build -t sensor-frontend ./frontend
