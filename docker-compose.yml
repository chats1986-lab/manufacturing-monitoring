services:
  postgres:
    image: postgres:16
    container_name: sensor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: additive
      POSTGRES_PASSWORD: additive
      POSTGRES_DB: additive_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U additive -d additive_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./sensor
      dockerfile: Dockerfile
    container_name: sensor-backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - ./sensor/.env
    environment:
      NODE_ENV: production
      PRETTY_LOGS: "false"
      DATABASE_URL: postgresql://additive:additive@postgres:5432/additive_monitoring
    depends_on:
      postgres:
        condition: service_healthy

  # Generates simulated industrial sensor readings
  # Writes directly into PostgreSQL using Prisma
  simulator:
    build:
      context: ./sensor
      dockerfile: Dockerfile
    container_name: sensor-simulator
    restart: unless-stopped
    env_file:
      - ./sensor/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://additive:additive@postgres:5432/additive_monitoring
    command: npm run simulate
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sensor-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - backend

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  postgres-data:
    name: additive-postgres-data

  prometheus-data:
    name: additive-prometheus-data

  grafana-data:
    name: additive-grafana-data

  loki-data:
    name: additive-loki-data
